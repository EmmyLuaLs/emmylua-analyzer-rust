name: Build emmylua_ls

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: emmylua_ls.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: emmylua_ls
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: emmylua_ls

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release -p emmylua_ls

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: emmylua_ls-${{ matrix.os }}
          path: target/release/${{ matrix.artifact }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            emmylua_ls-windows-latest/emmylua_ls.exe
            emmylua_ls-ubuntu-latest/emmylua_ls
            emmylua_ls-macos-latest/emmylua_ls
